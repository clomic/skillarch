#set-option -g mouse off
#set-option -g history-limit 10000
#set-option -g status-bg white
#set-option -g status-fg black
#
# To fix Home/End key in tmux
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-kitty:Ms=\E]52;c;%p2%s\7,xterm-256color:Tc'
set -g xterm-keys on
# Need to add in ~/.my_aliases: [[ -z "$TMUX" ]] && export TERM=xterm-256color

set -g history-limit 1000000
set -g renumber-windows on
set -g status-position top

# M = Alt
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

set -g mouse on
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"
bind -n WheelDownPane select-pane -t= \; send-keys -M
bind -n C-WheelUpPane select-pane -t= \; copy-mode -e \; send-keys -M
bind -T copy-mode-vi    C-WheelUpPane   send-keys -X halfpage-up
bind -T copy-mode-vi    C-WheelDownPane send-keys -X halfpage-down

# To copy, left click and drag to highlight text in yellow,
# once you release left click yellow text will disappear and will automatically be available in clibboard
# # Use vim keybindings in copy mode
setw -g mode-keys vi

bind -Tcopy-mode-vi C-j               send -X copy-pipe-and-cancel 'xsel -ib'
bind -Tcopy-mode-vi Enter             send -X copy-pipe-and-cancel 'xsel -ib'
bind -Tcopy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'xsel -ib'

set -s set-clipboard off


# for pi.dev
set -g extended-keys on
set -g extended-keys-format csi-u

# set -g @catppuccin_flavor 'frappe'
set -g @catppuccin_flavor "macchiato"
set -g @catppuccin_window_status_style "rounded"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux


# set -g status-right '#[fg=#{@thm_crust},bg=#{@thm_teal}] session: #S '
# set -g status-right-length 100

set -g status-right-length 100
set -g status-left-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"

set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"


